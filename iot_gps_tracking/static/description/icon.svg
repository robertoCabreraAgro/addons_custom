<?xml version="1.0" encoding="UTF-8"?>
<svg width="70" height="70" viewBox="0 0 70 70" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="35" cy="35" r="35" fill="#2E7D32"/>
  
  <!-- GPS Satellite Icon -->
  <g transform="translate(35, 35)">
    <!-- Outer Ring (Orbit) -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="white" stroke-width="2" opacity="0.6"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Center Location Pin -->
    <path d="M 0,-10 C -5.5,-10 -10,-5.5 -10,0 C -10,3.5 -7,8.5 0,18 C 7,8.5 10,3.5 10,0 C 10,-5.5 5.5,-10 0,-10 Z" 
          fill="white" stroke="#2E7D32" stroke-width="1"/>
    
    <!-- Center Dot -->
    <circle cx="0" cy="0" r="3" fill="#2E7D32"/>
    
    <!-- Satellite Dots -->
    <circle cx="20" cy="0" r="3" fill="white"/>
    <circle cx="-20" cy="0" r="3" fill="white"/>
    <circle cx="0" cy="20" r="3" fill="white"/>
    
    <!-- Signal Waves -->
    <path d="M 5,5 L 10,10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M -5,5 L -10,10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M 5,-5 L 10,-10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <path d="M -5,-5 L -10,-10" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  </g>
  
  <!-- IoT Badge -->
  <g transform="translate(50, 50)">
    <rect x="0" y="0" width="20" height="12" rx="2" fill="#1976D2"/>
    <text x="10" y="8" font-family="Arial, sans-serif" font-size="7" fill="white" text-anchor="middle">IoT</text>
  </g>
</svg>